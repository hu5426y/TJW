version: '3.9'
services:
  mysql:
    image: mysql:8.0
    container_name: eldercare-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: eldercare
    ports:
      - "3306:3306"
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/1_schema.sql
      - ./backend/src/main/resources/data.sql:/docker-entrypoint-initdb.d/2_data.sql

  redis:
    image: redis:7-alpine
    container_name: eldercare-redis
    ports:
      - "6379:6379"

  backend:
    image: maven:3.9-eclipse-temurin-17
    container_name: eldercare-backend
    working_dir: /app
    volumes:
      - ./backend:/app
    command: mvn spring-boot:run
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis

  frontend:
    image: node:20-alpine
    container_name: eldercare-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      - backend
